name: Test and Deploy to Cafe24

on:
  push:
    branches: [ "main" ] # 메인 브랜치에 푸시될 때 실행

jobs:
  test-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 1. PHP 및 Composer 세팅
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4' # 카페24 서버 버전과 맞추는 것이 좋습니다.
          extensions: mbstring, xml, ctype, iconv, mysql

      - name: Install Dependencies
        run: composer install --no-progress --prefer-dist --optimize-autoloader

      # 2. PHPUnit 테스트 실행
      - name: Run PHPUnit
        run: ./vendor/bin/phpunit tests

      # 3. 테스트 성공 시 FTP 배포
      - name: 🚚 Deploy to Cafe24
        if: success()
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./
          # 카페24는 보통 www 폴더가 웹 루트입니다.
          server-dir: ./www/
          dangerous-clean-slate: false
          exclude: |
            **/.git*
            **/node_modules/**
            **/tests/**
            **/config/**
            **/db/**
            **/docs/**
            **/.github/**
            phpunit.xml
            composer.json
            composer.lock