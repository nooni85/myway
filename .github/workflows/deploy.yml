name: Test and Deploy to Cafe24

on:
  push:
    branches: [ "main" ] # 메인 브랜치에 푸시될 때 실행

jobs:
  test-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 1. PHP 및 Composer 세팅
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4' # 카페24 서버 버전과 맞추는 것이 좋습니다.
          extensions: mbstring, xml, ctype, iconv, mysql

      - name: Install Dependencies
        run: composer install --no-progress --prefer-dist --optimize-autoloader

      # 2. PHPUnit 테스트 실행
      - name: Run PHPUnit
        run: ./vendor/bin/phpunit tests

      - name: 🚚 Deploy src to www
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          dangerous-clean-slate: false
          local-dir: src/
          server-dir: /src/

      # 두 번째 폴더 배포
      - name: 🚚 Deploy assets to www
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          dangerous-clean-slate: false
          local-dir: www/
          server-dir: /www/

      - name: 🚚 Deploy assets to vendor
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          dangerous-clean-slate: false
          local-dir: vendor/
          server-dir: /vendor/